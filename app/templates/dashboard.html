{% extends "base.html" %}

{% block content %}

<h1 class="mb-4">Dashboard</h1>

<div class="row">

    <div class="col-md-4">
        <div class="card text-white bg-primary mb-3">
            <div class="card-body">
                <h5>Total Projects</h5>
                <h2>{{ total_projects }}</h2>
            </div>
        </div>
    </div>

    <div class="col-md-4">
        <div class="card text-white bg-success mb-3">
            <div class="card-body">
                <h5>Active Projects</h5>
                <h2>{{ active_projects }}</h2>
            </div>
        </div>
    </div>

    <div class="col-md-4">
        <div class="card text-white bg-secondary mb-3">
            <div class="card-body">
                <h5>Completed Projects</h5>
                <h2>{{ completed_projects }}</h2>
            </div>
        </div>
    </div>

</div>

<hr>

<h3>Project Progress</h3>

{% for project in projects %}

<div class="progress">

    <div class="progress-bar
        {% if project.progress() == 100 %}
            bg-success
        {% elif project.progress() > 50 %}
            bg-primary
        {% else %}
            bg-warning
        {% endif %}" role="progressbar" style="width: {{ project.progress() }}%;">

        {{ project.progress() }}%

    </div>

</div>

{% endfor %}

{% endblock %}
